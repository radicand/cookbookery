# Default values for cookbook-web.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# -- Number of replicas for the web deployment
replicaCount: 1

# -- Override the chart name used in resource names
nameOverride: ""
# -- Override the full release name used in resource names
fullnameOverride: ""

# -- Image pull secrets for private registries
# Example:
#   - name: my-registry-secret
imagePullSecrets: []

image:
  # -- Container image repository
  repository: nginx
  # -- Image tag (defaults to Chart.appVersion if not set)
  tag: ""
  # -- Image pull policy
  pullPolicy: IfNotPresent

# -- Container port that the web server listens on
containerPort: 8080

# -- Health check configuration for liveness and readiness probes
healthCheck:
  # -- Path to use for health checks
  path: /
  # -- Delay before first probe is initiated
  initialDelaySeconds: 20
  # -- Timeout for each probe
  timeoutSeconds: 2

# -- Additional environment variables as a list of {name, value} or {name, valueFrom} objects.
# Example:
#   - name: MY_CUSTOM_VAR
#     value: "some-value"
extraEnv: []

ingress:
  # -- Whether to create an Ingress resource
  enabled: false
  # -- Annotations to add to the Ingress
  annotations: {}
  # -- Primary hostname for the Ingress
  host: ""
  # -- Additional hostnames that should route to this service
  extraHosts: []
  # -- TLS configuration
  tls: []
  #  - secretName: my-tls-secret
  #    hosts:
  #      - web.example.com

# -- Annotations to add to pods
podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext:
  capabilities:
    drop:
      - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  # -- Service type
  type: ClusterIP
  # -- Service port
  port: 80

# -- Resource requests and limits
resources: {}
  # requests:
  #   memory: "64Mi"
  #   cpu: "50m"
  # limits:
  #   memory: "128Mi"
  #   cpu: "100m"

serviceAccount:
  # -- Whether to create a ServiceAccount
  create: true
  # -- Annotations to add to the ServiceAccount
  annotations: {}
  # -- The name of the ServiceAccount to use.
  # If not set and create is true, a name is generated using the fullname template.
  name: ""

# -- Node selector for pod scheduling
nodeSelector: {}

# -- Tolerations for pod scheduling
tolerations: []

# -- Affinity rules for pod scheduling
affinity: {}
