name: Build and release web
concurrency:
  cancel-in-progress: true
  group: build-web

on:
  workflow_dispatch:
    inputs:
      tag_name:
        type: string
        description: 'Tag name'
        required: true
      environment:
        type: choice
        options:
          - production
          - staging
        description: 'Environment'
        required: true
        default: production
  workflow_call:
    inputs:
      tag_name:
        type: string
        description: 'Tag name'
        required: true
      environment:
        type: string
        description: 'Environment'
        required: true
    secrets:
      DOTENV:
        description: '.env file content'
        required: true
      CR_PAT:
        description: 'GitHub Container Registry Personal Access Token'
        required: true
jobs:
  build:
    environment:
      name: production
      url: https://${{ steps.envurl.outputs.url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Make env
        working-directory: app/
        run: |
          echo "${{ secrets.DOTENV }}" > .env

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/radicand/cookbookery-web
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha
            type=raw,value=${{ inputs.tag_name }}

      - name: Login to DockerHub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: radicand
          password: ${{ secrets.CR_PAT }}

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Install dependencies
        working-directory: app/
        run: flutter pub get

      - name: Build web
        working-directory: app/
        run: flutter build web --release

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      # https://github.com/docker/setup-buildx-action
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64,linux/arm64
          context: ./app
          file: ./app/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false

      # TODO: ArgoCD image tag update
      # The ArgoCD app manifest in the argocd-apps repo controls the deployed
      # image tag via its valuesObject. To automate tag bumps, either:
      #   1. Use ArgoCD Image Updater to watch ghcr.io/radicand/cookbookery-web
      #   2. Add a step here that clones argocd-apps, updates the tag in the
      #      cookbookery-web Application manifest, and pushes a commit.
      # For now, update the tag manually in the argocd-apps repo after pushing
      # a new image.

      - name: Delete packages older than 7 days (but keep at least 3 versions)
        uses: davahome/ghcr-cleanup@v1.1
        with:
          token: ${{ secrets.CR_PAT }}
          package: cookbookery-web
          owner: user
          minimum_days: 7
          keep_versions: 3
          delete_untagged: 1
          keep_versions_untagged: 3
