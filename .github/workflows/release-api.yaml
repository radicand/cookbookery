name: Build and release api
concurrency:
  cancel-in-progress: true
  group: build-api

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name'
        required: true
      environment:
        type: choice
        options:
          - production
          - staging
        description: 'Environment'
        required: true
        default: production
  workflow_call:
    inputs:
      tag_name:
        description: 'Tag name'
        type: string
        required: true
      environment:
        type: string
        description: 'Environment'
        required: true
    secrets:
      GH_PAT:
        description: 'GitHub Personal Access Token'
        required: true
      CR_PAT:
        description: 'Docker Personal Access Token'
        required: true
jobs:
  build:
    environment:
      name: production
      url: https://${{ steps.envurl.outputs.url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/radicand/cookbookery-api
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha
            type=raw,value=${{ inputs.tag_name }}

      - name: Login to DockerHub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: radicand
          password: ${{ secrets.CR_PAT }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      # https://github.com/docker/setup-buildx-action
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64,linux/arm64
          context: ./server/hasura
          file: ./server/hasura/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false

      # TODO: ArgoCD image tag update
      # The ArgoCD app manifest in the argocd-apps repo controls the deployed
      # image tag via its valuesObject. To automate tag bumps, either:
      #   1. Use ArgoCD Image Updater to watch ghcr.io/radicand/cookbookery-api
      #   2. Add a step here that clones argocd-apps, updates the tag in the
      #      cookbookery-api Application manifest, and pushes a commit.
      # For now, update the tag manually in the argocd-apps repo after pushing
      # a new image.

      - name: Delete packages older than 7 days (but keep at least 3 versions)
        uses: davahome/ghcr-cleanup@v1.1
        with:
          token: ${{ secrets.CR_PAT }}
          package: cookbookery-api
          owner: user
          minimum_days: 7
          keep_versions: 3
          delete_untagged: 1
          keep_versions_untagged: 3
